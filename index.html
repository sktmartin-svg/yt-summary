<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="YT Summary">
  <link rel="manifest" href="manifest.json">
  <title>YT Zusammenfasser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #ff0000;
      --red-dark: #cc0000;
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    header {
      background: var(--red);
      color: white;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 18px; font-weight: 700; }

    #settings-btn {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
    }

    main { padding: 16px; max-width: 600px; margin: 0 auto; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    label { font-size: 13px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    .input-wrap { display: flex; gap: 8px; }

    input[type="text"], input[type="password"], textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      background: white;
    }

    input:focus, textarea:focus { border-color: var(--red); }

    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      flex-shrink: 0;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-primary { background: var(--red); color: white; }
    .btn-primary:hover { background: var(--red-dark); }
    .btn-primary:disabled { background: #bbb; cursor: not-allowed; }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #fff8e1;
      border-radius: 8px;
      font-size: 14px;
      color: #7a6000;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #ccc;
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      background: #ffebee;
      border-radius: 8px;
      font-size: 14px;
      color: #c62828;
    }

    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .summary-header span { font-weight: 700; font-size: 15px; }

    .copy-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .copy-btn:active { background: var(--bg); }

    .summary-text {
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      color: var(--text);
    }

    /* Settings Overlay */
    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
    }

    #settings-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }

    .panel-handle {
      width: 40px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    #settings-panel h2 { font-size: 17px; margin-bottom: 16px; }

    .key-row { display: flex; gap: 8px; align-items: center; }

    .toggle-vis {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
    }

    .save-btn {
      margin-top: 12px;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .hint a { color: var(--red); text-decoration: none; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>▶ YT Zusammenfasser</h1>
  <button id="settings-btn" title="Einstellungen">⚙️</button>
</header>

<main>
  <!-- URL Input -->
  <div class="card">
    <label>YouTube URL</label>
    <div class="input-wrap">
      <input type="text" id="url-input" placeholder="https://youtube.com/watch?v=..." autocorrect="off" autocapitalize="none" spellcheck="false">
      <button class="clear-btn hidden" id="clear-btn">✕</button>
    </div>
  </div>

  <!-- Button -->
  <button class="btn btn-primary" id="summarize-btn" disabled>Zusammenfassen</button>

  <!-- Status -->
  <div class="status card hidden" id="status">
    <div class="spinner"></div>
    <span id="status-text">Lade…</span>
  </div>

  <!-- Error -->
  <div class="error card hidden" id="error-box">
    <span>⚠️</span>
    <span id="error-text"></span>
  </div>

  <!-- Result -->
  <div class="card hidden" id="result-card">
    <div class="summary-header">
      <span>Zusammenfassung</span>
      <button class="copy-btn" id="copy-btn">📋 Kopieren</button>
    </div>
    <div class="summary-text" id="summary-text"></div>
  </div>
</main>

<!-- Settings Overlay -->
<div id="settings-overlay">
  <div id="settings-panel">
    <div class="panel-handle"></div>
    <h2>Einstellungen</h2>
    <label>Claude API-Key</label>
    <div class="key-row">
      <input type="password" id="api-key-input" placeholder="sk-ant-…" autocorrect="off" autocapitalize="none">
      <button class="toggle-vis" id="toggle-vis">👁</button>
    </div>
    <p class="hint">Erhältlich unter <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></p>
    <button class="save-btn" id="save-key-btn">Speichern & Schließen</button>
  </div>
</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────────
  let apiKey = localStorage.getItem('claude_api_key') || '';

  // ─── DOM refs ────────────────────────────────────────────────────────────────
  const urlInput      = document.getElementById('url-input');
  const clearBtn      = document.getElementById('clear-btn');
  const summarizeBtn  = document.getElementById('summarize-btn');
  const statusEl      = document.getElementById('status');
  const statusText    = document.getElementById('status-text');
  const errorBox      = document.getElementById('error-box');
  const errorText     = document.getElementById('error-text');
  const resultCard    = document.getElementById('result-card');
  const summaryText   = document.getElementById('summary-text');
  const copyBtn       = document.getElementById('copy-btn');
  const settingsBtn   = document.getElementById('settings-btn');
  const overlay       = document.getElementById('settings-overlay');
  const apiKeyInput   = document.getElementById('api-key-input');
  const toggleVis     = document.getElementById('toggle-vis');
  const saveKeyBtn    = document.getElementById('save-key-btn');

  // ─── URL Input ───────────────────────────────────────────────────────────────
  urlInput.addEventListener('input', () => {
    const val = urlInput.value.trim();
    clearBtn.classList.toggle('hidden', !val);
    summarizeBtn.disabled = !val;
  });

  clearBtn.addEventListener('click', () => {
    urlInput.value = '';
    clearBtn.classList.add('hidden');
    summarizeBtn.disabled = true;
    hide(errorBox);
    hide(resultCard);
  });

  // ─── Settings ────────────────────────────────────────────────────────────────
  settingsBtn.addEventListener('click', () => {
    apiKeyInput.value = apiKey;
    overlay.style.display = 'block';
  });

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.style.display = 'none';
  });

  toggleVis.addEventListener('click', () => {
    const isPass = apiKeyInput.type === 'password';
    apiKeyInput.type = isPass ? 'text' : 'password';
    toggleVis.textContent = isPass ? '🙈' : '👁';
  });

  saveKeyBtn.addEventListener('click', () => {
    apiKey = apiKeyInput.value.trim();
    localStorage.setItem('claude_api_key', apiKey);
    overlay.style.display = 'none';
  });

  // ─── Copy ────────────────────────────────────────────────────────────────────
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(summaryText.textContent).then(() => {
      copyBtn.textContent = '✓ Kopiert!';
      setTimeout(() => { copyBtn.innerHTML = '📋 Kopieren'; }, 2000);
    });
  });

  // ─── Summarize ───────────────────────────────────────────────────────────────
  summarizeBtn.addEventListener('click', doSummarize);

  async function doSummarize() {
    if (!apiKey) {
      showError('Bitte zuerst den Claude API-Key in den Einstellungen (⚙️) eintragen.');
      return;
    }

    hide(errorBox);
    hide(resultCard);
    summarizeBtn.disabled = true;

    try {
      setStatus('Video-ID extrahieren…');

      const videoID = extractVideoID(urlInput.value.trim());
      if (!videoID) throw new Error('Ungültige YouTube-URL');

      setStatus('Transcript laden…');
      const transcript = await fetchTranscript(videoID);

      setStatus('Zusammenfassung erstellen…');
      const summary = await callClaude(transcript);

      hide(statusEl);
      summaryText.textContent = summary;
      resultCard.classList.remove('hidden');

    } catch (err) {
      hide(statusEl);
      showError(err.message);
    }

    summarizeBtn.disabled = false;
  }

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function show(el) { el.classList.remove('hidden'); }
  function hide(el) { el.classList.add('hidden'); }

  function setStatus(msg) {
    statusText.textContent = msg;
    show(statusEl);
  }

  function showError(msg) {
    errorText.textContent = msg;
    show(errorBox);
  }

  // ─── YouTube ─────────────────────────────────────────────────────────────────
  function extractVideoID(url) {
    try {
      const u = new URL(url);
      if (u.hostname.includes('youtu.be')) return u.pathname.slice(1);
      if (u.searchParams.has('v')) return u.searchParams.get('v');
      const parts = u.pathname.split('/');
      const si = parts.indexOf('shorts');
      if (si !== -1 && parts[si + 1]) return parts[si + 1];
    } catch (_) {}
    return null;
  }

  async function fetchWithProxy(url) {
    const proxies = [
      (u) => fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u)).then(r => { if (!r.ok) throw new Error(); return r.text(); }),
      (u) => fetch('https://corsproxy.io/?' + encodeURIComponent(u)).then(r => { if (!r.ok) throw new Error(); return r.text(); }),
      (u) => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(u)).then(r => { if (!r.ok) throw new Error(); return r.text(); }),
    ];
    const errors = [];
    for (const proxy of proxies) {
      try { return await proxy(url); } catch (e) { errors.push(e); }
    }
    throw new Error('YouTube konnte nicht geladen werden. Tipp: Öffne die App über einen lokalen Server oder GitHub Pages statt direkt als Datei.');
  }

  async function fetchTranscript(videoID) {
    const ytURL = `https://www.youtube.com/watch?v=${videoID}`;
    const html = await fetchWithProxy(ytURL);

    const captionsURL = extractCaptionsURL(html);
    if (!captionsURL) throw new Error('Kein Transcript verfügbar (Untertitel fehlen)');

    const xml = await fetchWithProxy(captionsURL);

    const text = parseCaptionXML(xml);
    if (!text) throw new Error('Transcript ist leer');
    return text;
  }

  function extractCaptionsURL(html) {
    const marker = '"captionTracks":';
    const idx = html.indexOf(marker);
    if (idx === -1) return null;

    const slice = html.slice(idx + marker.length);
    const urlMarker = '"baseUrl":"';
    const ui = slice.indexOf(urlMarker);
    if (ui === -1) return null;

    const start = ui + urlMarker.length;
    const end = slice.indexOf('"', start);
    if (end === -1) return null;

    return slice.slice(start, end)
      .replace(/\\u0026/g, '&')
      .replace(/\\u003d/g, '=')
      .replace(/\\u003c/g, '<')
      .replace(/\\u003e/g, '>');
  }

  function parseCaptionXML(xml) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const texts = [...doc.querySelectorAll('text')];
    return texts.map(t =>
      (t.textContent || '')
        .replace(/&amp;/g, '&')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&quot;/g, '"')
        .replace(/&#39;/g, "'")
        .trim()
    ).filter(Boolean).join(' ');
  }

  // ─── Claude ──────────────────────────────────────────────────────────────────
  async function callClaude(transcript) {
    const truncated = transcript.slice(0, 50000);

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: `Erstelle eine prägnante Zusammenfassung des folgenden YouTube-Transcripts auf Deutsch.

Format:
• Kernaussage in 2-3 Sätzen
• 3-5 wichtigste Punkte als Aufzählung

Transcript:
${truncated}`
        }]
      })
    });

    if (res.status === 401) throw new Error('Claude API-Key ungültig (401)');
    if (!res.ok) throw new Error(`Claude API Fehler (${res.status})`);

    const data = await res.json();
    return data.content?.[0]?.text || 'Keine Antwort erhalten';
  }
</script>

</body>
</html>
